<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.22);
            --glass-border: rgba(255, 255, 255, 0.45);
            --text-primary: #10213d;
            --text-secondary: rgba(16, 33, 61, 0.72);
            --shadow-soft: 0 12px 32px rgba(32, 45, 80, 0.2);
            --shadow-hover: 0 18px 36px rgba(16, 33, 61, 0.24);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(circle at 15% 15%, rgba(255, 144, 120, 0.5) 0%, transparent 30%),
                radial-gradient(circle at 85% 20%, rgba(106, 172, 255, 0.45) 0%, transparent 35%),
                radial-gradient(circle at 20% 85%, rgba(177, 137, 255, 0.45) 0%, transparent 35%),
                radial-gradient(circle at 80% 90%, rgba(111, 230, 205, 0.35) 0%, transparent 30%),
                linear-gradient(135deg, #dbeafe 0%, #f3e8ff 45%, #d9f8f2 100%);
            background-attachment: fixed;
        }

        .glass-panel {
            width: min(900px, 100%);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(22px) saturate(180%);
            -webkit-backdrop-filter: blur(22px) saturate(180%);
        }

        #login-form-id {
            width: min(380px, 100%);
            padding: 34px 28px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 22px;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .input-group {
            display: grid;
            gap: 12px;
        }

        input {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 0.95rem;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.48);
            backdrop-filter: blur(12px);
            transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        }

        input:focus {
            outline: none;
            border-color: rgba(77, 129, 255, 0.7);
            box-shadow: 0 0 0 4px rgba(77, 129, 255, 0.2);
            background: rgba(255, 255, 255, 0.6);
        }

        .btn {
            margin-top: 18px;
            border: none;
            border-radius: 14px;
            padding: 11px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, #4f8cff 0%, #7b6dff 55%, #af68ff 100%);
            box-shadow: 0 10px 22px rgba(79, 116, 255, 0.32);
            cursor: pointer;
            transition: transform 0.28s ease, box-shadow 0.28s ease, filter 0.28s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 28px rgba(79, 116, 255, 0.38);
            filter: brightness(1.05);
        }

        .btn:disabled {
            cursor: wait;
            opacity: 0.7;
            transform: none;
            box-shadow: 0 8px 18px rgba(79, 116, 255, 0.2);
        }

        #desktop-apps {
            display: none;
            padding: 34px 28px;
            text-align: center;
        }

        .subtitle {
            margin-top: -8px;
            margin-bottom: 26px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 22px;
            justify-items: center;
            margin-bottom: 30px;
        }

        .app-link {
            text-decoration: none;
            color: var(--text-primary);
            width: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s ease;
        }

        .app-squircle {
            width: 82px;
            height: 82px;
            border-radius: 30%;
            border: 1px solid rgba(255, 255, 255, 0.52);
            background: linear-gradient(155deg, rgba(255, 255, 255, 0.68), rgba(255, 255, 255, 0.28));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(16, 33, 61, 0.15);
            backdrop-filter: blur(8px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .app-squircle i {
            font-size: 1.85rem;
            color: #2650ba;
        }

        .app-name {
            font-size: 0.92rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: color 0.3s ease, font-weight 0.3s ease;
        }

        .app-link:hover .app-squircle {
            transform: scale(1.12);
            box-shadow: 0 16px 24px rgba(16, 33, 61, 0.22);
        }

        .app-link:hover .app-name {
            color: var(--text-primary);
            font-weight: 600;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ff6d79 0%, #ff4f73 45%, #ff7564 100%);
            box-shadow: 0 10px 20px rgba(255, 85, 113, 0.3);
        }

        .logout-btn:hover {
            box-shadow: 0 14px 28px rgba(255, 85, 113, 0.36);
        }

        .upload-card {
            margin: 12px auto 20px;
            width: min(440px, 100%);
            padding: 16px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.28);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            text-align: left;
        }

        .upload-title {
            margin: 0 0 10px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        #file-input {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .upload-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        #upload-status {
            margin: 0;
            font-size: 0.86rem;
            color: var(--text-secondary);
            min-height: 20px;
        }

        @media (max-width: 560px) {
            #desktop-apps,
            #login-form-id {
                padding: 28px 20px;
            }

            .apps-grid {
                grid-template-columns: repeat(2, minmax(110px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div id="login-form-id" class="glass-panel">
        <h2>Login Portal</h2>
        <div class="input-group">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
        </div>
        <button class="btn" onclick="login()">Masuk</button>
    </div>

    <div id="desktop-apps" class="glass-panel">
        <h2>Selamat Datang di Planning Portal</h2>
        <p class="subtitle">Pilih aplikasi untuk melanjutkan pekerjaan Anda.</p>

        <div class="apps-grid">
            <a href="https://username.github.io/yard-planning-dashboard/" target="_blank" rel="noopener noreferrer" class="app-link">
                <div class="app-squircle">
                    <i class="fa-solid fa-warehouse"></i>
                </div>
                <span class="app-name">Yard Planning</span>
            </a>

            <a href="https://username.github.io/app-kedua/" target="_blank" rel="noopener noreferrer" class="app-link">
                <div class="app-squircle">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <span class="app-name">Data Vessel</span>
            </a>
        </div>

        <div class="upload-card">
            <p class="upload-title">Upload Shared File</p>
            <input type="file" id="file-input">
            <div class="upload-actions">
                <button id="upload-btn" class="btn" onclick="uploadFile()">Upload File</button>
                <p id="upload-status"></p>
            </div>
        </div>

        <button class="btn logout-btn" onclick="logout()">Keluar</button>
    </div>

    <script type="module">
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        const SUPABASE_URL = "https://YOUR_PROJECT_ID.supabase.co";
        const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Your web app's Firebase configuration
        const firebaseConfig = {
          apiKey: "AIzaSyAFmv0ZCMGyqEijtH7CGTy6gwih_jTwHC4",
          authDomain: "planning-portal-88622.firebaseapp.com",
          projectId: "planning-portal-88622",
          storageBucket: "planning-portal-88622.firebasestorage.app",
          messagingSenderId: "382209491506",
          appId: "1:382209491506:web:442358253e523ec07c322b"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Fungsi Login
        window.login = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass)
                .catch(error => alert("Login Gagal: " + error.message));
        };

        // Cek Status Login Otomatis
        onAuthStateChanged(auth, (user) => {
            const loginForm = document.getElementById('login-form-id');
            const desktopApps = document.getElementById('desktop-apps');

            if (user) {
                // Jika sudah login
                loginForm.style.display = 'none';
                desktopApps.style.display = 'block';
            } else {
                // Jika belum login / logout
                loginForm.style.display = 'block';
                desktopApps.style.display = 'none';
            }
        });

        // Fungsi Logout
        window.logout = () => {
            signOut(auth).then(() => {
                alert("Berhasil keluar!");
            });
        };

        window.uploadFile = async () => {
            const fileInput = document.getElementById('file-input');
            const uploadButton = document.getElementById('upload-btn');
            const uploadStatus = document.getElementById('upload-status');
            const file = fileInput.files[0];

            if (!file) {
                uploadStatus.textContent = 'Silakan pilih file terlebih dahulu.';
                return;
            }

            const uniqueFileName = `${Date.now()}_${file.name}`;
            uploadButton.disabled = true;
            uploadButton.textContent = 'Uploading...';
            uploadStatus.textContent = 'Mengunggah file dan menyimpan metadata...';

            try {
                const { error: uploadError } = await supabase
                    .storage
                    .from('uploads')
                    .upload(uniqueFileName, file, { upsert: false });

                if (uploadError) {
                    throw uploadError;
                }

                const { error: insertError } = await supabase
                    .from('shared_files')
                    .insert({ url: uniqueFileName });

                if (insertError) {
                    throw insertError;
                }

                fileInput.value = '';
                uploadStatus.textContent = 'Upload berhasil.';
            } catch (error) {
                uploadStatus.textContent = `Upload gagal: ${error.message}`;
            } finally {
                uploadButton.disabled = false;
                uploadButton.textContent = 'Upload File';
            }
        };
    </script>
</body>
</html>
