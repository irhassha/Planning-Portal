<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.22);
            --glass-border: rgba(255, 255, 255, 0.45);
            --text-primary: #10213d;
            --text-secondary: rgba(16, 33, 61, 0.72);
            --shadow-soft: 0 12px 32px rgba(32, 45, 80, 0.2);
            --shadow-hover: 0 18px 36px rgba(16, 33, 61, 0.24);
            --accent: #2650ba;
            --accent-soft: rgba(38, 80, 186, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(circle at 15% 15%, rgba(255, 144, 120, 0.5) 0%, transparent 30%),
                radial-gradient(circle at 85% 20%, rgba(106, 172, 255, 0.45) 0%, transparent 35%),
                radial-gradient(circle at 20% 85%, rgba(177, 137, 255, 0.45) 0%, transparent 35%),
                radial-gradient(circle at 80% 90%, rgba(111, 230, 205, 0.35) 0%, transparent 30%),
                linear-gradient(135deg, #dbeafe 0%, #f3e8ff 45%, #d9f8f2 100%);
            background-attachment: fixed;
        }

        .glass-panel {
            width: min(900px, 100%);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(22px) saturate(180%);
            -webkit-backdrop-filter: blur(22px) saturate(180%);
        }

        #login-form-id {
            width: min(380px, 100%);
            padding: 34px 28px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 22px;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .input-group {
            display: grid;
            gap: 12px;
        }

        input {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 0.95rem;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.48);
            backdrop-filter: blur(12px);
            transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        }

        input:focus {
            outline: none;
            border-color: rgba(77, 129, 255, 0.7);
            box-shadow: 0 0 0 4px rgba(77, 129, 255, 0.2);
            background: rgba(255, 255, 255, 0.6);
        }

        .btn {
            margin-top: 18px;
            border: none;
            border-radius: 14px;
            padding: 11px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, #4f8cff 0%, #7b6dff 55%, #af68ff 100%);
            box-shadow: 0 10px 22px rgba(79, 116, 255, 0.32);
            cursor: pointer;
            transition: transform 0.28s ease, box-shadow 0.28s ease, filter 0.28s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 28px rgba(79, 116, 255, 0.38);
            filter: brightness(1.05);
        }

        .btn:disabled {
            cursor: wait;
            opacity: 0.7;
            transform: none;
            box-shadow: 0 8px 18px rgba(79, 116, 255, 0.2);
        }

        #desktop-apps {
            display: none;
            padding: 34px 28px;
            text-align: left;
        }

        .desktop-topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
            margin-bottom: 26px;
        }

        .hero-copy {
            flex: 1;
        }

        .welcome-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 18px rgba(32, 45, 80, 0.1);
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 14px;
        }

        .hero-copy h2 {
            margin-bottom: 10px;
        }

        .subtitle {
            margin-top: 0;
            margin-bottom: 0;
            color: var(--text-secondary);
            font-weight: 400;
            max-width: 520px;
            line-height: 1.6;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 22px;
            justify-items: center;
            margin-bottom: 30px;
        }

        .app-link {
            text-decoration: none;
            color: var(--text-primary);
            width: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .app-squircle {
            width: 82px;
            height: 82px;
            border-radius: 30%;
            border: 1px solid rgba(255, 255, 255, 0.52);
            background: linear-gradient(155deg, rgba(255, 255, 255, 0.68), rgba(255, 255, 255, 0.28));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(16, 33, 61, 0.15);
            backdrop-filter: blur(8px);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        }

        .app-squircle i {
            font-size: 1.85rem;
            color: #2650ba;
        }

        .app-name {
            font-size: 0.92rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: color 0.3s ease, font-weight 0.3s ease;
        }

        .app-link:hover .app-squircle {
            transform: scale(1.12);
            box-shadow: 0 16px 24px rgba(16, 33, 61, 0.22);
            background: linear-gradient(155deg, rgba(255, 255, 255, 0.82), rgba(219, 232, 255, 0.42));
        }

        .app-link:hover .app-name {
            color: var(--text-primary);
            font-weight: 600;
        }

        .app-link:hover {
            filter: saturate(1.1);
        }

        .logout-btn {
            background: linear-gradient(135deg, #ff6d79 0%, #ff4f73 45%, #ff7564 100%);
            box-shadow: 0 10px 20px rgba(255, 85, 113, 0.3);
            margin-top: 0;
        }

        .logout-btn:hover {
            box-shadow: 0 14px 28px rgba(255, 85, 113, 0.36);
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            flex-wrap: wrap;
        }

        .upload-inline {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 24px rgba(32, 45, 80, 0.12);
        }

        .upload-card {
            margin: 0;
            width: auto;
            padding: 0;
            border-radius: 0;
            border: none;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            text-align: left;
        }

        .upload-title {
            display: none;
        }

        #file-input {
            margin-top: 0;
            margin-bottom: 0;
            max-width: 210px;
            padding: 10px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.62);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .upload-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .upload-btn {
            margin-top: 0;
            padding-inline: 18px;
            background: linear-gradient(135deg, #1f6fff 0%, #4f8cff 100%);
        }

        #upload-status {
            margin: 0;
            font-size: 0.86rem;
            color: var(--text-secondary);
            min-height: 20px;
            margin-top: 18px;
            padding: 10px 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.35);
            width: fit-content;
            max-width: 100%;
        }

        .floating-orb {
            position: absolute;
            inset: auto auto 8% 8%;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 70%);
            pointer-events: none;
            filter: blur(6px);
            animation: floatOrb 6s ease-in-out infinite;
        }

        @keyframes floatOrb {
            0%, 100% {
                transform: translateY(0px) scale(1);
            }
            50% {
                transform: translateY(-12px) scale(1.06);
            }
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-panel,
        .app-link,
        .upload-inline,
        #upload-status {
            animation: fadeSlideUp 0.6s ease both;
        }

        @media (max-width: 560px) {
            #desktop-apps,
            #login-form-id {
                padding: 28px 20px;
            }

            .desktop-topbar {
                flex-direction: column;
                align-items: stretch;
            }

            .topbar-actions {
                justify-content: flex-start;
            }

            .apps-grid {
                grid-template-columns: repeat(2, minmax(110px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="floating-orb"></div>
    <div id="login-form-id" class="glass-panel">
        <h2>Portal Login</h2>
        <div class="input-group">
            <input type="email" id="email" placeholder="Email address">
            <input type="password" id="password" placeholder="Password">
        </div>
        <button class="btn" onclick="login()">Sign In</button>
    </div>

    <div id="desktop-apps" class="glass-panel">
        <div class="desktop-topbar">
            <div class="hero-copy">
                <div class="welcome-chip">
                    <i class="fa-solid fa-sparkles"></i>
                    <span id="welcome-note">Welcome</span>
                </div>
                <h2>Planning Workspace</h2>
                <p class="subtitle">Access your operational tools, upload shared files, and continue your workflow from one modern dashboard.</p>
            </div>

            <div class="topbar-actions">
                <div class="upload-card">
                    <p class="upload-title">Upload Shared File</p>
                    <div class="upload-inline">
                        <input type="file" id="file-input">
                        <button id="upload-btn" class="btn upload-btn" onclick="uploadFile()">Upload</button>
                    </div>
                </div>
                <button class="btn logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <p id="upload-status"></p>

        <div class="apps-grid">
            <a href="https://username.github.io/yard-planning-dashboard/" target="_blank" rel="noopener noreferrer" class="app-link">
                <div class="app-squircle">
                    <i class="fa-solid fa-warehouse"></i>
                </div>
                <span class="app-name">Yard Planning</span>
            </a>

            <a href="https://username.github.io/app-kedua/" target="_blank" rel="noopener noreferrer" class="app-link">
                <div class="app-squircle">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <span class="app-name">Vessel Data</span>
            </a>
        </div>
    </div>

    <script type="module">
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

        const SUPABASE_URL = "https://YOUR_PROJECT_ID.supabase.co";
        const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const loginForm = document.getElementById('login-form-id');
        const desktopApps = document.getElementById('desktop-apps');
        const welcomeNote = document.getElementById('welcome-note');

        const getWelcomeName = (email = '') => {
            const [, domainPart = 'User'] = email.split('@');
            return domainPart || 'User';
        };

        const updateAuthView = (session) => {
            if (session?.user) {
                welcomeNote.textContent = `Welcome, ${getWelcomeName(session.user.email)}`;
                loginForm.style.display = 'none';
                desktopApps.style.display = 'block';
                return;
            }

            welcomeNote.textContent = 'Welcome';
            loginForm.style.display = 'block';
            desktopApps.style.display = 'none';
        };

        // Fungsi Login
        window.login = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            const { error } = await supabase.auth.signInWithPassword({
                email,
                password: pass
            });

            if (error) {
                alert("Sign in failed: " + error.message);
            }
        };

        const { data: sessionData } = await supabase.auth.getSession();
        updateAuthView(sessionData.session);

        supabase.auth.onAuthStateChange((_event, session) => {
            updateAuthView(session);
        });

        // Fungsi Logout
        window.logout = async () => {
            const { error } = await supabase.auth.signOut();

            if (error) {
                alert("Sign out failed: " + error.message);
                return;
            }

            alert("Signed out successfully.");
        };

        window.uploadFile = async () => {
            const fileInput = document.getElementById('file-input');
            const uploadButton = document.getElementById('upload-btn');
            const uploadStatus = document.getElementById('upload-status');
            const file = fileInput.files[0];

            if (!file) {
                uploadStatus.textContent = 'Please choose a file first.';
                return;
            }

            const uniqueFileName = `${Date.now()}_${file.name}`;
            uploadButton.disabled = true;
            uploadButton.textContent = 'Uploading...';
            uploadStatus.textContent = 'Uploading file and saving record...';

            try {
                const { error: uploadError } = await supabase
                    .storage
                    .from('uploads')
                    .upload(uniqueFileName, file, { upsert: false });

                if (uploadError) {
                    throw uploadError;
                }

                const { error: insertError } = await supabase
                    .from('shared_files')
                    .insert({ url: uniqueFileName });

                if (insertError) {
                    throw insertError;
                }

                fileInput.value = '';
                uploadStatus.textContent = 'Upload completed successfully.';
            } catch (error) {
                uploadStatus.textContent = `Upload failed: ${error.message}`;
            } finally {
                uploadButton.disabled = false;
                uploadButton.textContent = 'Upload';
            }
        };
    </script>
</body>
</html>
